name: 🛰️ Build & Deploy Dash

# Builds the root Jekyll site (zer0-mistakes remote theme), regenerating live
# monitoring data at build time so the Monitor board stays fresh without commits.
# REPLACES build-docs.yml (MkDocs) as the published GitHub Pages surface.

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - '_data/**'
      - '_config.yml'
      - 'index.md'
      - 'assets/**'
      - 'README.md'
      - '.github/scripts/dash-gen/**'
      - '.github/actions/setup/dash-gen/**'
      - '.github/workflows/build-dash.yml'
  schedule:
    - cron: '0 */6 * * *'   # keep the Monitor board current
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup/dash-gen

      - name: Generate monitoring data (ephemeral)
        run: python .github/scripts/dash-gen/dash_gen.py health || echo "health gen degraded; continuing"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
