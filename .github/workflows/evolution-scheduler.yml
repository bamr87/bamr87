name: 🌱 Evolution Scheduler (per-repo)

# Weekly fan-out that runs the per-repo AI evolution pass (repo-evolution.yml) against
# every submodule opted in via `auto_evolve: true` in dash/_data/projects.yml.
# Selection is registry-driven; the matrix is generated by `dash-gen targets`.
#
# Relationship to unified-evolution.yml: that workflow evolves the MONOREPO itself; this
# one reviews/analyzes/contributes to the INDIVIDUAL upstream repos. See docs/EVOLUTION.md.

on:
  schedule:
    - cron: '0 7 * * 1'   # weekly Monday 07:00 UTC (offset after the 06:00 root run)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run Claude against each repo but do not open PRs'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  plan:
    name: 📋 Build evolution matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      count: ${{ steps.targets.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pip install pyyaml
      - name: Generate target matrix
        id: targets
        run: |
          set -euo pipefail
          JSON="$(python3 .github/scripts/dash-gen/dash_gen.py targets)"
          echo "matrix={\"include\":$JSON}" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$JSON" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')" >> "$GITHUB_OUTPUT"
          echo "## 🌱 Evolution targets" >> "$GITHUB_STEP_SUMMARY"
          echo "$JSON" | python3 -c 'import json,sys; [print(f"- {t[\"name\"]} (`{t[\"branch\"]}`, {t[\"category\"]})") for t in json.load(sys.stdin)]' >> "$GITHUB_STEP_SUMMARY"

  evolve:
    name: 🌿 Evolve
    needs: plan
    if: ${{ needs.plan.outputs.count != '0' }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/repo-evolution.yml
    with:
      repo_name: ${{ matrix.name }}
      repo_url:  ${{ matrix.repo_url }}
      branch:    ${{ matrix.branch }}
      category:  ${{ matrix.category }}
      stack:     ${{ matrix.stack }}
      dry_run:   ${{ inputs.dry_run == true }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PAT_TOKEN:         ${{ secrets.PAT_TOKEN }}
