name: standardize-fanout

# Downward propagation: opens standardization PRs INTO submodule repos, seeding
# baseline artifacts (.editorconfig, the reusable standard-ci caller, and — on
# request — the agent-context kit: a CLAUDE.md scaffold and the @claude OAuth
# workflow). This is the complement to update-submodules.yml (which only bumps
# pointers UP). The clone→seed→commit→PR engine is shared with schema-fanout:
# tools/fanout.sh (dry-run by default, PRs only, skips external upstreams,
# additive-only seeding).
#
# SAFETY: dispatch-only, dry-run by default, opens PRs (never pushes to a
# default branch). Requires a repo secret FANOUT_TOKEN — a fine-grained PAT
# with contents:write + pull-requests:write + workflows:write on the target
# repos (the ci/claude artifacts push .github/workflows/* files, which GitHub
# refuses without the Workflows permission; the default GITHUB_TOKEN cannot
# push to other repositories at all).

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Submodule name, or 'all'"
        type: string
        default: "all"
      artifacts:
        description: "Comma-separated: editorconfig,ci,agent-context,claude"
        type: string
        default: "editorconfig,ci"
      dry_run:
        description: "Build branches but don't push/PR"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: standardize-fanout
  cancel-in-progress: false

jobs:
  fanout:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout control plane
        uses: actions/checkout@v4

      - name: Open standardization PRs
        env:
          GH_TOKEN: ${{ secrets.FANOUT_TOKEN }}
          TARGET: ${{ inputs.target }}
          ARTIFACTS: ${{ inputs.artifacts }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::FANOUT_TOKEN secret is required (fine-grained PAT with contents+PR+workflows write)."
            exit 1
          fi
          APPLY=()
          if [ "$DRY_RUN" != "true" ]; then APPLY=(--apply); fi
          tools/fanout.sh --kit standardize --target "$TARGET" --artifacts "$ARTIFACTS" "${APPLY[@]}"
