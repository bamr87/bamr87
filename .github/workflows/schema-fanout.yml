name: schema-fanout

# Downward propagation of the Pyramid Schema framework: opens adoption PRs
# INTO submodule repos, seeding the kit (vendored linter, SCHEMA.md scaffolds,
# schema-check CI, agent protocol snippet in CLAUDE.md). Complement of
# standardize-fanout; both ride the shared engine tools/fanout.sh — same
# safety posture: dispatch-only, dry-run by default, PRs only (never pushes
# to a default branch), and skips submodules whose upstream isn't
# github.com/bamr87 (e.g. the microsoft/skills mirror).
#
# Secrets:
#   FANOUT_TOKEN             required — fine-grained PAT with contents:write +
#                            pull-requests:write + workflows:write on the
#                            target repos (the kit seeds schema-check.yml,
#                            which GitHub refuses to push without the
#                            Workflows permission).
#   CLAUDE_CODE_OAUTH_TOKEN  only for agent_fill — Claude Code OAuth token
#                            (from `claude setup-token`); the agent pass turns
#                            scaffold TODOs into real purposes on the PR branch.
#                            ANTHROPIC_API_KEY works as a fallback. See
#                            docs/AI-INTEGRATION.md.
#
# agent_fill is single-target by design: forty agent runs from one dispatch is
# a cost decision a human should make forty times.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Submodule name, or 'all'"
        type: string
        default: "all"
      dry_run:
        description: "Build branches but don't push/PR"
        type: boolean
        default: true
      agent_fill:
        description: "After seeding, run Claude Code (OAuth) to fill TODO purposes — single target only"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: schema-fanout
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      slug: ${{ steps.resolve.outputs.slug }}
    steps:
      - name: Checkout control plane
        uses: actions/checkout@v4

      # agent-fill must not assume repo name == submodule dir name (e.g.
      # edgar-data-parse's upstream is fredgar-ai) — resolve the slug from
      # the .gitmodules URL, exactly like the engine does.
      - name: Resolve target repo slug
        id: resolve
        if: ${{ inputs.target != 'all' }}
        run: |
          set -euo pipefail
          sect="$(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' \
                  | awk -v p="projects/${{ inputs.target }}" '$2==p{print $1}' \
                  | sed 's/^submodule\.//; s/\.path$//')"
          if [ -z "$sect" ]; then
            echo "::error::no submodule at projects/${{ inputs.target }}"; exit 1
          fi
          url="$(git config -f .gitmodules --get "submodule.${sect}.url")"
          echo "slug=bamr87/$(basename "${url%.git}")" >> "$GITHUB_OUTPUT"

      - name: Open schema adoption PRs
        env:
          GH_TOKEN: ${{ secrets.FANOUT_TOKEN }}
          TARGET: ${{ inputs.target }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::FANOUT_TOKEN secret is required (fine-grained PAT with contents+PR+workflows write)."
            exit 1
          fi
          APPLY=()
          if [ "$DRY_RUN" != "true" ]; then APPLY=(--apply); fi
          tools/fanout.sh --kit schema --target "$TARGET" "${APPLY[@]}"

  # Claude Code fills the scaffold TODOs on the adoption branch, then pushes
  # to the already-open PR. Runs only for a real (non-dry) single-target
  # dispatch with agent_fill. Auth: OAuth token preferred, API key fallback.
  agent-fill:
    needs: seed
    if: ${{ inputs.agent_fill && inputs.target != 'all' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HAS_CLAUDE_AUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Require Claude auth
        if: ${{ env.HAS_CLAUDE_AUTH != 'true' }}
        run: |
          echo "::error::agent_fill needs CLAUDE_CODE_OAUTH_TOKEN (preferred; from 'claude setup-token') or ANTHROPIC_API_KEY. See docs/AI-INTEGRATION.md."
          exit 1

      - name: Checkout target adoption branch
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.seed.outputs.slug }}
          ref: chore/schema-adoption
          token: ${{ secrets.FANOUT_TOKEN }}

      - name: Fill schema purposes with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN == '' && secrets.ANTHROPIC_API_KEY || '' }}
          prompt: |
            This repository just adopted the Pyramid Schema: every directory
            carries a SCHEMA.md contract (scaffolded, purposes still TODO).

            Your task, and nothing else:
            1. Replace every TODO purpose in every SCHEMA.md with a real
               one-line purpose derived from the directory's actual contents.
            2. Where a directory holds a homogeneous collection with a naming
               rule (dated posts, ADRs, migrations, components), replace the
               per-file rows with a single `pattern` row.
            3. Mark build-output directories `generated` and vendored trees
               `terminal`, and delete any scaffolded SCHEMA.md files inside
               them.
            4. Fill the Placement route for the two or three most common kinds
               of additions to this repo.
            Keep `python3 tools/schema_lint.py check .` passing with zero
            errors. Do not modify any file other than SCHEMA.md files.
          claude_args: "--max-turns 25"

      - name: Push agent pass to the PR branch
        run: |
          set -euo pipefail
          git add -A
          if git -c user.name=bamr87-bot -c user.email=10567847+bamr87@users.noreply.github.com \
               commit -m "docs(schema): fill scaffold purposes (Claude agent pass)"; then
            git push origin chore/schema-adoption
          else
            echo "agent pass produced no changes"
          fi
