name: 🤖 Workflow Error Review

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days to look back for failures'
        required: false
        default: '7'
      create_issue:
        description: 'Create a GitHub issue with findings'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  review-failures:
    name: 🔍 Review Workflow Failures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect and report workflow failures
        uses: actions/github-script@v7
        with:
          script: |
            const lookbackDays = parseInt('${{ github.event.inputs.lookback_days }}' || '7');
            const createIssue = '${{ github.event.inputs.create_issue }}' !== 'false';
            const since = new Date();
            since.setDate(since.getDate() - lookbackDays);
            const sinceDate = since.toISOString().split('T')[0];

            // Fetch failed workflow runs
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'failure',
              created: `>=${sinceDate}`,
              per_page: 50
            });

            if (runs.workflow_runs.length === 0) {
              core.summary.addHeading('✅ No Workflow Failures', 2);
              core.summary.addRaw(`No workflow failures in the last ${lookbackDays} days.`);
              await core.summary.write();
              core.info('No failures found.');
              return;
            }

            // Group failures by workflow name
            const grouped = {};
            for (const run of runs.workflow_runs) {
              if (!grouped[run.name]) grouped[run.name] = [];

              let failedJobs = [];
              try {
                const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                  filter: 'latest'
                });
                failedJobs = jobs.jobs
                  .filter(j => j.conclusion === 'failure')
                  .map(j => ({
                    name: j.name,
                    steps: j.steps
                      .filter(s => s.conclusion === 'failure')
                      .map(s => s.name)
                  }));
              } catch (e) {
                core.warning(`Could not fetch jobs for run ${run.id}: ${e.message}`);
              }

              grouped[run.name].push({
                id: run.id,
                url: run.html_url,
                date: run.created_at.split('T')[0],
                branch: run.head_branch,
                event: run.event,
                failedJobs
              });
            }

            // Build markdown report
            const lines = [
              `## 🤖 Workflow Error Review`,
              ``,
              `**Period:** Last ${lookbackDays} days (since ${sinceDate})`,
              `**Total failures:** ${runs.workflow_runs.length}`,
              ``
            ];

            for (const [name, failures] of Object.entries(grouped)) {
              lines.push(`### ${name} — ${failures.length} failure(s)`);
              lines.push('');
              for (const f of failures.slice(0, 5)) {
                lines.push(`- [Run #${f.id}](${f.url}) — ${f.date} on \`${f.branch}\` (${f.event})`);
                for (const job of f.failedJobs) {
                  lines.push(`  - Job: \`${job.name}\``);
                  for (const step of job.steps) {
                    lines.push(`    - Failed step: \`${step}\``);
                  }
                }
              }
              if (failures.length > 5) {
                lines.push(`- _...and ${failures.length - 5} more_`);
              }
              lines.push('');
            }

            lines.push('---');
            lines.push('');
            lines.push('### Recommendations for Copilot AI Agent');
            lines.push('');
            lines.push('Please analyze the workflow failures above and provide:');
            lines.push('1. **Root cause patterns** — Are failures clustered in specific workflows or steps?');
            lines.push('2. **Flaky vs consistent** — Which failures appear intermittent?');
            lines.push('3. **Fix suggestions** — Concrete YAML or code changes to resolve failures.');
            lines.push('4. **Priority ranking** — Which failures should be addressed first?');
            lines.push('5. **Prevention** — How to avoid similar failures going forward.');

            const report = lines.join('\n');

            // Write step summary
            core.summary.addRaw(report);
            await core.summary.write();

            // Create GitHub issue if enabled
            if (createIssue) {
              const footer = [
                '',
                '---',
                `_Generated by [Workflow Error Review](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) on ${new Date().toISOString().split('T')[0]}_`
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🤖 Workflow Review: ${runs.workflow_runs.length} failure(s) — week of ${sinceDate}`,
                body: report + footer,
                labels: ['workflow-review', 'automated', 'copilot-review']
              });
              core.info('GitHub issue created.');
            }
