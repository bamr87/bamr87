name: Update Submodules

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule path to update. Leave blank to update all.'
        required: false
        type: string
      base_branch:
        description: 'Base branch for the update pull request.'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update submodule pointers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        uses: ./.github/actions/setup/configure-git
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodules
        id: update
        shell: bash
        run: |
          set -euo pipefail

          requested_submodule="${{ inputs.submodule }}"

          if [[ ! -f .gitmodules ]]; then
            echo "No .gitmodules file found."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          update_submodule() {
            local submodule_path="$1"

            if grep -qE "^[[:space:]]*path[[:space:]]*=[[:space:]]*${submodule_path}$" .gitmodules; then
              echo "Updating submodule: ${submodule_path}"
              git submodule update --init --recursive --remote --merge "${submodule_path}" || {
                echo "::warning::Failed to update ${submodule_path}"
              }
            else
              echo "::warning::Submodule ${submodule_path} not found in .gitmodules"
            fi
          }

          if [[ -n "${requested_submodule}" ]]; then
            update_submodule "${requested_submodule}"
          else
            while IFS= read -r submodule_path; do
              update_submodule "${submodule_path}"
            done < <(git config --file .gitmodules --get-regexp path | awk '{ print $2 }')
          fi

          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "changed_files<<EOF"
              git diff --cached --name-only
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(submodule): update ${{ inputs.submodule || 'all' }} submodule pointer(s)"
          title: "chore(submodule): update ${{ inputs.submodule || 'all' }} submodule pointer(s)"
          body: |
            Automated submodule pointer update.

            Changed files:

            ```text
            ${{ steps.update.outputs.changed_files }}
            ```

            Review the corresponding submodule repositories before merging.
          branch: "chore/update-submodules-${{ github.run_id }}"
          base: ${{ inputs.base_branch || 'main' }}
          labels: automation, submodule
          delete-branch: true

      - name: No changes
        if: steps.update.outputs.changed == 'false'
        run: echo "No submodule pointer updates detected."
