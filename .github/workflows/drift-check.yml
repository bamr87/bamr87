name: 🚧 Drift Check

# Hard gate (fast, deterministic): fails CI on registry ↔ .gitmodules drift,
# stray/unregistered project dirs, a stale README AUTO:projects span, or missing
# top-level READMEs. Also runs an advisory (non-gating) check that the registry's
# repo_urls still match GitHub reality — renamed / moved / deleted repos the
# set-vs-set parity check can't see (uses GITHUB_TOKEN; self-skips if unreachable).
#
# Deliberately submodule-content-agnostic and offline+API only — no Ruby/Jekyll
# build. The internal-link check moved out of the gate (it was non-gating and
# needed a full site build); run it locally with `tools/check-drift.sh --links`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: drift-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      # Shallow, no submodules: the gate reads .gitmodules, the registry, and
      # top-level READMEs — never submodule working trees.
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gate deps
        run: pip install pyyaml   # the gate needs PyYAML + gh (preinstalled on the runner)

      - name: Run drift gate
        run: tools/check-drift.sh --ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
