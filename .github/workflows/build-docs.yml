name: Build and Deploy Documentation (DEPRECATED — superseded by build-dash.yml)

# SUPERSEDED by build-dash.yml (Jekyll + zer0-mistakes). Kept as a manual-only
# fallback during the MkDocs→Jekyll cutover. Do NOT run while Pages Source is set
# to "GitHub Actions" — `mkdocs gh-deploy` pushes to a branch and will conflict
# with the deploy-pages flow. Scheduled for removal once the dash is verified live.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Full history for git info plugin
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements-docs.txt
      
      - name: Build documentation
        run: |
          mkdocs build --strict
      
      - name: Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
