name: Feature Request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the desired outcome. This helps keep feature requests focused.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or workflow gap should this solve?
      placeholder: I need to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
      placeholder: Add, change, or standardize...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this request?
      options:
        - Low - nice to have
        - Medium - improves workflow
        - High - blocks important work
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I can help implement this
        - label: I can help test this
        - label: I can help document this

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, screenshots, links, or related issues.
