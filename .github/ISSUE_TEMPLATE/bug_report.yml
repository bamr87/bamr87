name: Bug Report
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction details help resolve issues faster.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant OS, browser, runtime, package, or container details.
      placeholder: |
        - OS:
        - Browser:
        - Runtime:
        - Container:

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, logs, links, or related issues.
