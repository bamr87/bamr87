# AI Content Review Configuration
#
# This file is intentionally generic. Adjust defaults, include patterns, and
# thresholds in each repository before enabling content review workflows.

required_fields:
  - title
  - description
  - date
  - author

recommended_fields:
  - excerpt
  - lastmod
  - draft
  - tags

defaults:
  author: "REPLACE_WITH_AUTHOR"
  draft: false

quality_thresholds:
  min_word_count: 100
  max_word_count: 3000
  min_headers: 1
  max_sentence_length: 25

ai_review:
  model: "gpt-4"
  max_tokens: 1500
  temperature: 0.3

seo:
  title_min_length: 30
  title_max_length: 60
  description_min_length: 120
  description_max_length: 160
  max_tags: 10

file_patterns:
  include:
    - "**/*.md"
  exclude:
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/.git/**"

workflow_settings:
  max_files_per_run: 20
  artifact_retention_days: 30
  auto_fix_enabled: false

tag_keywords:
  tutorial: ["tutorial", "guide", "how-to", "walkthrough"]
  git: ["git", "github", "version control", "commit"]
  ai: ["ai", "artificial intelligence", "machine learning", "gpt"]
  python: ["python", "pip", "flask", "fastapi"]
  javascript: ["javascript", "js", "node", "npm", "react"]
  automation: ["automation", "workflow", "ci/cd", "github actions"]
  docker: ["docker", "container", "dockerfile"]
  cloud: ["aws", "azure", "gcp", "cloud"]
