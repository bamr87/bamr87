# ============================================================================
# bamr87 Monorepo — Development Tool Manifest
# ============================================================================
#
# Central registry of all tools, packages, and dependencies required for
# development. The setup script (tools/setup.sh) reads this file instead
# of hardcoding package lists.
#
# FORMAT:
#   [section]              — Section header
#   package                — Package name (applies to all platforms unless overridden)
#   package  # comment     — Inline description
#   @brew    package       — macOS Homebrew only
#   @apt     package       — Ubuntu/Debian apt only
#   @winget  ID            — Windows winget only
#   @cask    package       — Homebrew cask (macOS GUI apps)
#   @pip     package       — Python pip (global/user install)
#   @npm     package       — npm global install
#   @custom  label         — Requires custom install logic (handled in setup.sh)
#
# Lines starting with # are comments. Blank lines are ignored.
#
# To add a new tool: add it to the appropriate section, then run:
#   ./tools/setup.sh --dry-run --verbose
#
# ============================================================================

# --------------------------------------------------------------------------
# [core] — Required on every platform. Installed first.
# --------------------------------------------------------------------------
[core]
git                             # Version control (2.13+)
jq                              # JSON processor for scripts
curl                            # HTTP client

# --------------------------------------------------------------------------
# [languages] — Programming language runtimes
# --------------------------------------------------------------------------
[languages]
@brew    node                   # Node.js (LTS via Homebrew)
@brew    python@3               # Python 3.x
@apt     python3                # Python 3 runtime
@apt     python3-pip            # pip package manager
@apt     python3-venv           # Virtual environment support
@apt     python3-dev            # Python development headers
@custom  node-linux             # Node.js LTS via NodeSource (apt)
@winget  OpenJS.NodeJS.LTS      # Node.js LTS
@winget  Python.Python.3.12     # Python 3.12

# --------------------------------------------------------------------------
# [containers] — Docker and container tooling
# --------------------------------------------------------------------------
[containers]
@brew    docker                 # Docker CLI
@brew    docker-compose         # Docker Compose
@custom  docker-linux           # Docker Engine via get.docker.com
@custom  compose-linux          # Docker Compose plugin (apt)
@winget  Docker.DockerDesktop   # Docker Desktop for Windows

# --------------------------------------------------------------------------
# [devtools] — Developer productivity tools
# --------------------------------------------------------------------------
[devtools]
gh                              # GitHub CLI
shellcheck                      # Shell script linter
@pip     pre-commit             # Git pre-commit hook framework
@pip     black                  # Python formatter
@pip     flake8                 # Python linter

# --------------------------------------------------------------------------
# [editors] — Code editors and IDE support (optional)
# --------------------------------------------------------------------------
[editors]
@cask    visual-studio-code     # VS Code (macOS)
@winget  Microsoft.VisualStudioCode  # VS Code (Windows)

# --------------------------------------------------------------------------
# [build] — Build tools and compilers
# --------------------------------------------------------------------------
[build]
@apt     build-essential        # gcc, make, etc.
@apt     ca-certificates        # SSL certificates
@apt     gnupg                  # GPG for package signing
@apt     lsb-release            # LSB release info
@apt     wget                   # HTTP client (apt)

# --------------------------------------------------------------------------
# [python-docs] — Python packages for documentation (installed in venvs)
#   These are NOT installed globally; the setup script uses requirements
#   files (requirements-docs.txt, README/requirements.txt) for venvs.
#   Listed here for visibility only.
# --------------------------------------------------------------------------
[python-docs]
# See: requirements-docs.txt         (MkDocs)
# See: README/requirements.txt       (README documentation system)

# --------------------------------------------------------------------------
# [node-cv] — Node packages for CV Builder (installed via npm in cv/)
#   These are NOT installed globally; npm install reads cv/package.json.
#   Listed here for visibility only.
# --------------------------------------------------------------------------
[node-cv]
# See: cv/package.json

# --------------------------------------------------------------------------
# [env] — Shell environment variables exported by tools/devtools-env.sh
#   Sourced by .zprofile for consistent dev environment paths.
# --------------------------------------------------------------------------
[env]
BAMR87_HOME=~/bamr87
BAMR87_TOOLS=$BAMR87_HOME/tools
BAMR87_SCRIPTS=$BAMR87_HOME/scripts
