# Pre-commit hooks for bamr87 monorepo
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--safe]
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD041]

  # YAML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.11.0
    hooks:
      - id: pretty-format-yaml
        args: [--autofix, --indent, '2']

  # Shell script checking
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # Python formatting (for documentation scripts)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        files: ^projects/README/.*\.py$

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --extend-ignore=E203]
        files: ^projects/README/.*\.py$

  # Prettier for JavaScript/TypeScript/JSON/Markdown
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, markdown, yaml]
        exclude: ^(projects/cv-builder-pro/package-lock\.json|.*\.min\.(js|css))$

  # Liquid-safe "one paragraph per line" for the Jekyll dash pages. Prettier is
  # kept off these (see .prettierignore) because its markdown parser merges
  # {% %} tags into prose and breaks rendering; this surgical unwrapper only
  # joins wrapped prose, leaving Liquid/HTML/tables/code/front-matter untouched.
  - repo: local
    hooks:
      - id: unwrap-prose
        name: markdown one paragraph per line (Liquid-safe)
        entry: python3 tools/unwrap-prose.py --write
        language: system
        files: ^(pages/.*\.md|index\.md)$

# Skip these hooks in CI (too slow)
ci:
  skip: [shellcheck, markdownlint]
