# =============================================================================
# dash/_data/projects.yml  —  THE PROJECT REGISTRY (single source of truth)
# =============================================================================
# Every dash surface reads from this file:
#   - Jekyll Portfolio/Dashboard/Monitor pages (site.data.projects)
#   - The profile README.md AUTO:projects section (via .github/scripts/dash-gen)
#   - The drift gate (tools/check-drift.sh) cross-checks against .gitmodules
#
# Schema (per entry):
#   name           required  canonical repo name (used as the join key for health data)
#   slug           optional  short id; equals the submodule dir when a submodule
#   submodule_path optional  path in .gitmodules when this project is a submodule;
#                            null/absent => external repo (shown, not drift-checked)
#   branch         required  default branch; MUST equal .gitmodules branch for submodules
#   repo_url       required  GitHub repo URL
#   description    required  one-line summary
#   stack          list      tech tags
#   category       required  docs | full-stack-ai | dev-tools | dash
#   status         required  active | maintenance | experiment | archived
#   featured       bool      surface on the portfolio's featured grid
#   maintained     bool      actively maintained
#   live_url       optional  deployed site (null if none)
#   docs_url       optional  documentation URL (null if none)
#   release        optional  standardized release pipeline (bamr87/.github). Sub-keys:
#                            engine: release-please | type: ruby|node|python|simple
#                            registries: [rubygems|npm|pypi|ghcr|github]
#                            status: adopted (merged) | pending (PR open) | none
#                            pr: optional adoption PR URL
#   schema         optional  Pyramid Schema adoption (SCHEMA.md structural contracts,
#                            seeded from templates/schema/ via tools/seed-schema.sh or
#                            the schema-fanout workflow; see docs/SCHEMA-FRAMEWORK.md).
#                            Sub-keys:
#                            status: adopted (merged) | pending (PR open) | none
#                            pr: optional adoption PR URL
#   license        optional  SPDX id (e.g. MIT, Apache-2.0) or null if none yet
#   tier           optional  standardization tier override (active|experiment|
#                            content|fork|archived). Normally derived from status
#                            via _data/standards.yml; set only to override.
#                            The standardization baseline per tier lives in
#                            _data/standards.yml; the audit is `tools/dash audit`.
# =============================================================================

# ---------------------------------------------------------------------------
# Submodules (must stay in sync with .gitmodules — enforced by check-drift.sh)
# ---------------------------------------------------------------------------
