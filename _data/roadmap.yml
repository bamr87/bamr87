- id: FF-0003
  title: "AI cost telemetry via OpenTelemetry — local collector stack with per-prompt drill-down (finance-ai Layer 2)"
  project: bamr87
  repo_url: https://github.com/bamr87/bamr87
  status: approved
  priority: P2
  effort: L
  category: infra
  problem: >-
    The AI-activity layer (tools/dash ai, .github/scripts/dash-gen/ai_activity.py)
    is pull-based and daily-grained. It can say what a repo cost per day at list
    prices, but not which prompt, skill, agent, or MCP server burned the tokens,
    and there is no live view of spend while a session is running. Request-level
    questions ("why was Thursday $9?") currently have no answer surface.
  proposal: >-
    Opt into Claude Code's native OTel instrumentation and stand up a local,
    opt-in backend. Add a `telemetry` profile to docker-compose.yml with four
    services (otel-collector, prometheus, loki, grafana) and provisioned config
    checked into the repo, plus a documented managed-settings/env template that
    sets CLAUDE_CODE_ENABLE_TELEMETRY=1 and points OTLP metric/log exporters at
    the local collector. Ship one provisioned Grafana dashboard implementing the
    question tiers from finance-ai.md — estimated spend over time, split by model
    and query_source, cache-read ratio, and session→prompt drill-down via Loki
    queries on prompt.id. Single machine, single developer, local-only.
  acceptance:
    - "`docker compose --profile telemetry up -d` starts otel-collector + prometheus + loki + grafana with provisioned datasources/dashboards committed to the repo."
    - "A documented settings template (managed settings or ~/.claude/settings.json env block) enables telemetry and targets the local collector; no endpoints or tokens are hard-coded elsewhere."
    - "claude_code.cost.usage and claude_code.token.usage are queryable in Prometheus; user_prompt/api_request/tool_result events land in Loki and filter by prompt.id."
    - "The committed Grafana dashboard shows spend over time, per-model/query_source split, cache-read ratio, and links a session to its prompt-level events."
    - "Local-only is preserved: telemetry services never run in CI and the published dash stays free of spend data."
    - "docs/DASH.md documents the layer split — ledger scan is retroactive history, OTel is forward-looking drill-down — and that dollar figures remain estimates."
  scope:
    in:
      - docker-compose.yml `telemetry` profile + collector/prometheus/loki/grafana provisioning
      - managed-settings / env rollout template and docs
      - one provisioned Grafana dashboard
    out:
      - Layer 3 Admin APIs (org-level reporting)
      - multi-user fleet rollout, auth hardening, cloud backends
      - replacing the JSONL ledger (OTel only captures forward from enablement)
      - traces beta (CLAUDE_CODE_ENHANCED_TELEMETRY_BETA) beyond a docs note
  risks:
    - Metric cardinality — session-id/account-uuid labels can explode Prometheus series; keep OTEL_METRICS_INCLUDE_SESSION_ID off by default.
    - Prometheus/Loki volumes grow unbounded without retention limits — set retention in the provisioned config.
    - The managed-settings path differs per OS (macOS vs Linux container) — document both or prefer the user settings env block.
    - Four extra containers is heavy for one developer — the compose profile must keep the stack strictly opt-in.
  source: scout
  created: 2026-07-06
  issue_url: null

- id: FF-0004
  title: "Per-run AI cost ledger and --max-budget-usd guardrails for headless agent invocations"
  project: bamr87
  repo_url: https://github.com/bamr87/bamr87
  status: approved
  priority: P1
  effort: M
  category: infra
  problem: >-
    Headless invocations — the weekly unified-evolution.yml Claude pass and any
    local `claude -p` scripting — bypass the AI-activity ledger entirely, since
    CI runners have their own ~/.claude and the local scan never sees them. They
    also run uncapped in dollar terms; the only guardrail today is
    `--max-turns 30`. A misbehaving automation run has no budget ceiling and
    leaves no cost record.
  proposal: >-
    Use the per-run accounting Claude Code already emits. Add a wrapper
    (`tools/dash ai run -- <args>`) that invokes `claude -p --output-format
    json` with a default --max-budget-usd, parses session_id, usage, and
    total_cost_usd from the result, and merges a record into a new `runs`
    section of ~/.claude/ai-activity-ledger.json; render headless runs as their
    own table on /ai-activity/. In CI, add an explicit --max-budget-usd to
    claude_args in unified-evolution.yml, write the run's total_cost_usd to the
    job summary, and upload the raw result JSON as a workflow artifact.
  acceptance:
    - "`tools/dash ai run -- <prompt/args>` wraps claude -p, enforces a default budget cap, and appends {timestamp, machine, repo, session_id, models, usage, total_cost_usd, source} to the ledger's runs section."
    - "unified-evolution.yml passes an explicit --max-budget-usd and a budget abort is loud (job annotation/failure), not silent."
    - "Each CI evolution run publishes total_cost_usd in the GitHub Actions job summary and uploads the result JSON as an artifact."
    - "`tools/dash ai` renders headless runs as a distinct table on /ai-activity/, never blended into interactive-session estimates."
    - "Run records dedupe by session_id so a local headless run is not double-counted by the JSONL scan."
    - "The run-record schema is documented in .github/scripts/dash-gen/README.md."
  scope:
    in:
      - wrapper subcommand, ledger `runs` section, /ai-activity/ rendering
      - budget cap + cost surfacing in unified-evolution.yml
    out:
      - automatic sync of CI run records into the local ledger (artifact download/import stays manual)
      - budget enforcement for interactive sessions
      - a database — the JSON ledger is sufficient at this scale
  risks:
    - claude-code-action@v1 may not expose the result JSON directly — verify whether claude_args + its execution log yield total_cost_usd before committing to the CI half.
    - A budget abort mid-evolution leaves partial work on the branch — pick generous caps and make the abort path explicit.
    - Cost figures are still estimates on subscription auth; label them as such everywhere they surface.
  source: scout
  created: 2026-07-06
  issue_url: null

- id: FF-0005
  title: "ccusage reconciliation check and opt-in MCP burn-rate self-awareness for the AI-activity layer"
  project: bamr87
  repo_url: https://github.com/bamr87/bamr87
  status: approved
  priority: P2
  effort: S
  category: enhancement
  problem: >-
    The shadow-pricing math in ai_activity.py rests on a hand-maintained PRICING
    table (last refreshed 2026-06-24), alias resolution, and homegrown dedupe.
    A new model id, a list-price change, or a dedupe regression would silently
    skew every number on /ai-activity/ with no signal. Separately, agents have
    no way to query their own burn rate mid-session, so cost economizing cannot
    be an in-loop instruction.
  proposal: >-
    Two thin additions. (1) `tools/dash ai check` runs a pinned `npx ccusage
    daily --json` over the same JSONL files and reconciles per-day and per-model
    totals against the generator's report, warning past a configurable tolerance
    and itemizing explainable deltas (unpriced models, intro-pricing divergence)
    — an independent audit of the pricing table and dedupe logic. (2) A
    documented, opt-in .mcp.json snippet for the ccusage MCP server so an agent
    can answer "what has this session cost so far" and be instructed to
    economize (switch models, compact, stop early).
  acceptance:
    - "`tools/dash ai check` prints a per-day/per-model delta table versus ccusage and exits non-zero (or warns unmistakably) beyond a configurable tolerance."
    - "Explainable deltas — unpriced models, known pricing divergences — are itemized separately from unexplained drift."
    - "The ccusage version is pinned in the check so schema changes fail loudly instead of skewing the comparison."
    - "A documented .mcp.json snippet adds the ccusage MCP server as an explicit opt-in; it is not enabled by default."
    - "docs/DASH.md's AI-activity section documents the check cadence and the self-awareness pattern."
  scope:
    in:
      - reconciliation subcommand + tolerance config
      - opt-in MCP snippet and docs
    out:
      - treating ccusage as the source of truth (the ledger stays authoritative)
      - auto-updating the PRICING table from ccusage output
      - scheduled/CI reconciliation (the data is local-only)
  risks:
    - ccusage is third-party — JSON schema and its own pricing source can change; pinning mitigates but does not eliminate drift.
    - Day bucketing may differ (timezones) — compare in a fixed timezone or tolerate day-boundary noise.
    - An always-on MCP server adds session startup overhead and context — keep it opt-in.
  source: scout
  created: 2026-07-06
  issue_url: null

- id: FF-0006
  title: "Impact verification for actions-review issues — measure before/after waste per filed optimization"
  project: bamr87
  repo_url: https://github.com/bamr87/bamr87
  status: approved
  priority: P2
  effort: M
  category: enhancement
  problem: >-
    The Actions AI-reviewer loop (actions_review.py + actions-review.yml) files
    one optimization issue per worst-offending workflow, but nothing measures
    whether a filed or resolved issue actually reduced that workflow's waste. The
    reviewer's own ROI — is the Opus spend buying real minute savings? — is
    unmeasured, and recommendations that worked can't be told apart from ones that
    were ignored or made no difference.
  proposal: >-
    Add a deterministic follow-up pass (e.g. `tools/dash-gen actions-impact`, or a
    step after the reviewer) that, for each `actions-review` issue (identified by
    the hidden `<!-- actions-review key="..." -->` marker), compares the target
    workflow's current analytics metrics (waste_min, effectiveness_pct, avg_min,
    total_min) against a baseline captured when the issue was filed, computes a
    before/after delta, and posts/updates an issue comment (and/or a small
    committed impact ledger keyed by marker) — e.g. "waste 62m → 8m (-87%) since
    #NN." Requires persisting the baseline snapshot at issue-creation time (in the
    issue body next to the marker, or a committed ledger), since actions_usage.yml
    is overwritten daily. Surface an aggregate "minutes recovered by the reviewer
    loop" figure on /actions/.
  acceptance:
    - "Each actions-review issue records a baseline metric snapshot (waste/effectiveness/avg/total) at creation time, keyed by its marker."
    - "A follow-up pass recomputes the same metrics from the latest analytics and posts a before/after delta per open/resolved issue."
    - "Workflows that improved past a threshold are flagged (optionally auto-commented / close-suggested); issues with no improvement after N days are flagged stale/ineffective."
    - "The /actions/ page shows an aggregate 'minutes recovered since issue filed' for resolved recommendations."
    - "The measurement runs deterministically without the AI step (impact is computed in code, not by a model)."
    - "Degrades gracefully when a target workflow was renamed or deleted between baseline and recompute."
  scope:
    in:
      - baseline capture at issue creation, delta-recompute pass, per-issue comment + aggregate /actions/ surfacing
    out:
      - automatic issue closing without human confirmation
      - causal attribution of the improvement to the fix (report it as observational/correlational)
  risks:
    - Correlation is not causation — a workflow may improve for unrelated reasons; label deltas as observational.
    - Baseline needs durable storage (issue-body marker or committed ledger) because actions_usage.yml is overwritten daily.
    - Workflow rename/deletion breaks the marker→workflow key match — handle missing targets explicitly.
  source: scout
  created: 2026-07-13
  issue_url: null

- id: FF-0007
  title: "Retain a rolling Actions-analytics history and flag regressions/anomalies day-over-day"
  project: bamr87
  repo_url: https://github.com/bamr87/bamr87
  status: approved
  priority: P2
  effort: M
  category: infra
  problem: >-
    actions_analytics writes a single committed snapshot (_data/actions_usage.yml)
    that is overwritten daily. There is no retained history, so a workflow that
    suddenly regresses — jumps from 40m to 400m, or whose success rate collapses —
    is invisible beyond that day's numbers, and nothing proactively surfaces it;
    you'd only catch it by manually diffing the page.
  proposal: >-
    Retain a compact, bounded time series of the per-workflow/per-repo metrics
    (append a committed history file such as _data/actions_usage_history.yml keyed
    by date + workflow marker, rolled to a retention window) and add a regression
    detector to the daily pass that compares the latest window against a trailing
    baseline, flagging workflows whose total_min/avg_min/waste_min spiked or whose
    effectiveness/success_rate dropped beyond configurable thresholds. Render
    regressions as a distinct band on /actions/ and optionally feed a `regressed`
    flag into the actions-review candidate selection so a fresh regression is
    prioritized. This history is also the substrate FF-0006 needs for baselines.
  acceptance:
    - "The daily pass appends a compact per-workflow metric history that stays committable, small, and bounded to a retention window/rollup."
    - "A regression check flags workflows whose total_min/avg_min/waste_min rose or whose effectiveness/success_rate fell beyond configurable thresholds vs a trailing baseline."
    - "Regressions render as a distinct 'newly regressed' section on /actions/ with before/after numbers."
    - "actions_review.select() can prioritize a `regressed` flag so fresh regressions enter the work order."
    - "Regression thresholds are tunable constants alongside the existing analytics thresholds."
    - "History-file growth is bounded and the bound is enforced (verified so the drift gate stays green)."
  scope:
    in:
      - bounded history-retention file, regression detector + thresholds, /actions/ surfacing, optional select() integration
    out:
      - external alerting (email/Slack) — page surfacing + feeding the reviewer is enough
      - a full time-series database (bounded YAML/JSON is sufficient at this scale)
  risks:
    - A committed history file can grow unbounded — enforce a retention window/rollup.
    - Naturally spiky workflows create noise — require a minimum absolute delta plus a percentage.
    - Window overlap could double-count — key strictly by date.
  source: scout
  created: 2026-07-13
  issue_url: null

- id: FF-0008
  title: "Let the Actions reviewer open high-confidence mechanical fix PRs into submodules (opt-in)"
  project: bamr87
  repo_url: https://github.com/bamr87/bamr87
  status: approved
  priority: P2
  effort: L
  category: feature
  problem: >-
    The Actions AI-reviewer only FILES issues; a human must still open every fix
    PR into the submodule. For a class of high-confidence, mechanical fixes —
    missing `concurrency: cancel-in-progress`, missing `timeout-minutes`, obvious
    dependency caching, an over-frequent cron — that round-trip is pure toil, and
    many issues will sit unactioned.
  proposal: >-
    Extend the loop with an opt-in "fix" mode that, for candidates whose
    recommended change is mechanical and high-confidence, opens ONE draft PR
    directly into the target submodule — reusing the standardize-fanout /
    unified-evolution claude-code-action pattern and reading the submodule's branch
    from .gitmodules/the registry (never assuming main). Each PR links back to its
    originating actions-review issue and stays strictly gated: an allowlist of
    change types, a per-run PR cap, draft-only, requires ANTHROPIC_API_KEY plus a
    dedicated fine-grained PAT with contents/PR write, and dry-run by default.
    Low-confidence or non-mechanical findings continue to file issues only.
  acceptance:
    - "An opt-in mode opens at most a capped number of DRAFT PRs per run, only for an allowlisted set of mechanical fixes (concurrency, timeout-minutes, caching, cron cadence)."
    - "Each PR targets the correct submodule + branch (read from .gitmodules/registry, not assumed main), references the source actions-review issue, and contains only the scoped change."
    - "Non-mechanical or low-confidence candidates fall back to issue-only (current behavior)."
    - "The mode is off by default, requires explicit dispatch/flag, and is skipped when the required secrets are absent."
    - "PRs dedupe against already-open fix PRs for the same workflow marker."
    - "docs/DASH.md documents the escalation ladder: measure → file issue → (opt-in) draft fix PR."
  scope:
    in:
      - opt-in fix mode, mechanical-change allowlist, draft PR into the submodule, issue linkage, guardrails
    out:
      - auto-merge of the fix PRs
      - non-mechanical / semantic fixes
      - touching more than one workflow per PR
  risks:
    - Opening PRs across ~36 external submodule repos automatically is high-blast-radius — draft-only, capped, allowlisted, opt-in.
    - Submodule branch/permission variance — must read the branch from the registry and hold a PAT scoped to the fleet.
    - A wrong "mechanical" fix (e.g. too-low timeout) could break CI — keep the allowlist conservative and PRs draft for human review.
  source: scout
  created: 2026-07-13
  issue_url: null

- id: FF-0009
  title: "Surface Actions waste and open actions-review issues on the /monitor/ attention board"
  project: bamr87
  repo_url: https://github.com/bamr87/bamr87
  status: approved
  priority: P3
  effort: S
  category: enhancement
  problem: >-
    Actions waste and the AI reviewer's open `actions-review` issues live only on
    /actions/ and in the bamr87 issue tracker, disconnected from the /monitor/
    attention board (which ranks repos by health: CI, issues, PRs, security,
    activity). A repo bleeding CI minutes or carrying open optimization issues
    doesn't raise its attention rank or show up where a maintainer triages.
  proposal: >-
    Fold Actions signals into the monitor surface: join per-repo Actions waste
    (from actions_usage.yml `by_repo`) and open actions-review issue counts into
    the health/attention model so a high-waste or optimization-backlogged repo is
    reflected on /monitor/, and/or add a compact "Actions attention" strip linking
    each flagged workflow to its /actions/ row and its optimization issue. Read-only
    aggregation over existing committed/generated data — no new collection.
  acceptance:
    - "The /monitor/ board (or an adjacent strip) shows per-repo Actions waste and open actions-review issue count from existing data files."
    - "A repo with significant Actions waste or open optimization issues is visibly surfaced (badge/column or a modest attention-rank contribution)."
    - "Links connect a flagged repo to its /actions/ detail and its open optimization issue(s)."
    - "No new API calls beyond joining actions_usage.yml with issue counts health already gathers."
    - "Degrades cleanly when actions_usage.yml is absent."
  scope:
    in:
      - join Actions waste + actions-review issue counts into the monitor surface; cross-links
    out:
      - materially rewriting the attention_rank algorithm (a modest signal contribution is fine)
      - any new data collection beyond existing generated files
  risks:
    - Over-weighting Actions waste could drown out health signals — keep it a modest input or a separate strip.
    - Public-repo minutes are free, so waste is an effort signal, not a dollar signal — label accordingly.
  source: scout
  created: 2026-07-13
  issue_url: null
